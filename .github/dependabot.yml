version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7     # optional      
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "github-actions"
      - "dependencies"
    reviewers:
      - "asmeurer"
